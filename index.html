<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Motivational Dice</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    #message {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    #dice-container {
      perspective: 1000px;
      margin: 40px auto;
      width: 150px;
      height: 150px;
    }

    #dice {
      width: 120px;
      height: 120px;
      margin: auto;
      background: #fff;
      border-radius: 20px; /* curved edges */
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      padding: 10px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
      transform-style: preserve-3d;
    }

    .dot {
      width: 28px;
      height: 28px;
      background: #000;
      border-radius: 50%;
      margin: 10px;
      box-shadow: 0 0 6px rgba(0,0,0,0.8); /* bold look */
    }

    #rollBtn {
      background: #ff9800;
      border: none;
      padding: 12px 24px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
      font-weight: bold;
      transition: background 0.3s;
    }
    #rollBtn:hover { background: #e68900; }

    #quote {
      margin-top: 30px;
      font-size: 20px;
      font-style: italic;
    }

    /* Footer styling */
    #footer {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      align-items: center;
    }
    #footer a {
      color: #fff;
      text-decoration: none;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #footer img {
      width: 32px;
      height: 32px;
      transition: transform 0.3s, filter 0.3s;
    }
    #footer img:hover {
      transform: scale(1.2);
      filter: drop-shadow(0 0 6px #fff);
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="message">Click the button to roll the dice!</div>
  <div id="dice-container">
    <div id="dice"></div>
  </div>
  <button id="rollBtn">Roll Dice</button>
  <div id="quote"></div>

  <!-- Footer with official icons -->
  <div id="footer">
    <a href="https://instagram.com/YOUR_INSTAGRAM_HANDLE" target="_blank">
      <img src="assets/icons/instagram.png" alt="Instagram"> Instagram
    </a>
    <a href="mailto:yourname@gmail.com">
      <img src="assets/icons/gmail.png" alt="Gmail"> Gmail
    </a>
    <a href="tel:+1234567890">
      <img src="assets/icons/phone.png" alt="Phone"> Call
    </a>
  </div>

  <script>
    const dice = document.getElementById('dice');
    const quoteBox = document.getElementById('quote');
    const rollBtn = document.getElementById('rollBtn');

    const quotes = {
      1: "Believe in yourself and all that you are.",
      2: "Every day is a new beginning.",
      3: "Push yourself, because no one else will.",
      4: "Dream big and dare to fail.",
      5: "Stay positive, work hard, make it happen.",
      6: "Success is not final, failure is not fatal."
    };

    let rolling = false;
    let rollInterval;

    function renderDice(num) {
      dice.innerHTML = '';
      const dotPositions = {
        1: [4],
        2: [0,8],
        3: [0,4,8],
        4: [0,2,6,8],
        5: [0,2,4,6,8],
        6: [0,2,3,5,6,8]
      };
      for (let i=0; i<9; i++) {
        const cell = document.createElement('div');
        cell.style.width = '33%';
        cell.style.height = '33%';
        cell.style.display = 'flex';
        cell.style.justifyContent = 'center';
        cell.style.alignItems = 'center';
        if (dotPositions[num].includes(i)) {
          const dot = document.createElement('div');
          dot.className = 'dot';
          cell.appendChild(dot);
        }
        dice.appendChild(cell);
      }
    }

    rollBtn.addEventListener('click', () => {
      if (rolling) {
        // Stop rolling
        clearInterval(rollInterval);
        rolling = false;
      } else {
        // Start rolling
        rolling = true;
        rollInterval = setInterval(() => {
          const roll = Math.floor(Math.random() * 6) + 1;
          renderDice(roll);
          quoteBox.textContent = quotes[roll];
        }, 200);

        // Stop after 2 seconds
        setTimeout(() => {
          clearInterval(rollInterval);
          rolling = false;
        }, 2000);
      }
    });

    // Initial render
    renderDice(1);
  </script>
</body>
</html>
