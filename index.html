<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Motivational Dice</title>
  <style>
    body { margin: 0; overflow: hidden; background: linear-gradient(135deg, #1e3c72, #2a5298); color: #fff; font-family: 'Poppins', sans-serif; }
    #message { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 24px; font-weight: bold; }
    #footer {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 40px; align-items: center;
    }
    #footer a { color: #fff; text-decoration: none; font-size: 18px; display: flex; align-items: center; gap: 8px; }
    #footer img { width: 32px; height: 32px; transition: transform 0.3s, filter 0.3s; }
    #footer img:hover { transform: scale(1.2); filter: drop-shadow(0 0 6px #fff); }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div id="message">Click the dice to roll!</div>

<!-- Footer with official icons -->
<div id="footer">
  <a href="https://instagram.com/YOUR_INSTAGRAM_HANDLE" target="_blank">
    <img src="assets/icons/instagram.png" alt="Instagram"> Instagram
  </a>
  <a href="mailto:yourname@gmail.com">
    <img src="assets/icons/gmail.png" alt="Gmail"> Gmail
  </a>
  <a href="tel:+91XXXXXXXXXX">
    <img src="assets/icons/call.png" alt="Phone"> Call Me
  </a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const geometry = new THREE.BoxGeometry();
  const messages = [
    "Keep pushing forward.",
    "Every setback is a setup for a comeback.",
    "Small steps build big dreams.",
    "Stay curious, stay strong.",
    "Your effort defines your success.",
    "Believe in progress, not perfection."
  ];
  const colors = ["#ff4c4c","#4caf50","#2196f3","#ff9800","#9c27b0","#ffc107"];

  const canvases = messages.map((msg, i) => {
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = colors[i]; ctx.fillRect(0,0,256,256);
    ctx.fillStyle = "#fff"; ctx.font = "20px Poppins"; ctx.textAlign = "center"; ctx.fillText(msg, 128, 128);
    return new THREE.CanvasTexture(canvas);
  });

  const materials = canvases.map(tex => new THREE.MeshBasicMaterial({ map: tex }));
  const dice = new THREE.Mesh(geometry, materials);
  scene.add(dice);

  camera.position.z = 3;

  function animate() {
    requestAnimationFrame(animate);
    dice.rotation.x += 0.01;
    dice.rotation.y += 0.01;
    renderer.render(scene, camera);
  }
  animate();

  document.body.addEventListener("click", () => {
    const face = Math.floor(Math.random() * 6);
    document.getElementById("message").innerText = messages[face];
  });
</script>
</body>
</html>
