<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Click to Roll the Dice!</h1>
  <div class="scene">
  <div class="cube" id="dice">
    <div class="face front"> <!-- dots for 1 --> </div>
    <div class="face back">  <!-- dots for 2 --> </div>
    <div class="face right"> <!-- dots for 3 --> </div>
    <div class="face left">  <!-- dots for 4 --> </div>
    <div class="face top">   <!-- dots for 5 --> </div>
    <div class="face bottom"><!-- dots for 6 --> </div>
  </div>
</div>
<button id="rollBtn">Roll Dice</button>
<p id="quote"></p>

  <script src="script.js"></script>
</body>
</html>
