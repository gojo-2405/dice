<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Motivational Dice</title>
  <style>
    body { margin: 0; overflow: hidden; background: linear-gradient(135deg, #1e3c72, #2a5298); color: #fff; font-family: 'Poppins', sans-serif; text-align: center; }
    #message { margin-top: 20px; font-size: 24px; font-weight: bold; }
    #dice {
      width: 120px; height: 120px; margin: 40px auto;
      background: #fff; border-radius: 16px; display: flex; flex-wrap: wrap;
      justify-content: center; align-items: center; padding: 10px;
    }
    .dot {
      width: 24px; height: 24px; background: #000; border-radius: 50%;
      margin: 10px;
    }
    #rollBtn {
      background: #ff9800; border: none; padding: 12px 24px; font-size: 18px;
      border-radius: 8px; cursor: pointer; color: #fff; font-weight: bold;
      transition: background 0.3s;
    }
    #rollBtn:hover { background: #e68900; }
    #quote { margin-top: 30px; font-size: 20px; font-style: italic; }

    /* Footer styling */
    #footer {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 40px; align-items: center;
    }
    #footer a { color: #fff; text-decoration: none; font-size: 18px; display: flex; align-items: center; gap: 8px; }
    #footer img { width: 32px; height: 32px; transition: transform 0.3s, filter 0.3s; }
    #footer img:hover { transform: scale(1.2); filter: drop-shadow(0 0 6px #fff); }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="message">Click the button to roll the dice!</div>
  <div id="dice"></div>
  <button id="rollBtn">Roll Dice</button>
  <div id="quote"></div>

  <!-- Footer with official icons -->
  <div id="footer">
    <a href="https://instagram.com/karthick.r24" target="_blank">
      <img src="assets/icons/instagram.png" alt="Instagram"> Instagram
    </a>
    <a href="mailto:karthickrajendran@proton.me">
      <img src="assets/icons/gmail.png" alt="Gmail"> Mail
    </a>
    <a href="tel:+918190873057">
      <img src="assets/icons/phone.png" alt="Phone"> Call
    </a>
  </div>

  <script>
    const dice = document.getElementById('dice');
    const quoteBox = document.getElementById('quote');

    const quotes = [
      "Believe in yourself and all that you are.",
      "Every day is a new beginning.",
      "Push yourself, because no one else will.",
      "Dream big and dare to fail.",
      "Stay positive, work hard, make it happen.",
      "Success is not final, failure is not fatal."
    ];

    function renderDice(num) {
      dice.innerHTML = '';
      const dotPositions = {
        1: [4],
        2: [0,8],
        3: [0,4,8],
        4: [0,2,6,8],
        5: [0,2,4,6,8],
        6: [0,2,3,5,6,8]
      };
      for (let i=0; i<9; i++) {
        const cell = document.createElement('div');
        cell.style.width = '33%';
        cell.style.height = '33%';
        cell.style.display = 'flex';
        cell.style.justifyContent = 'center';
        cell.style.alignItems = 'center';
        if (dotPositions[num].includes(i)) {
          const dot = document.createElement('div');
          dot.className = 'dot';
          cell.appendChild(dot);
        }
        dice.appendChild(cell);
      }
    }

    document.getElementById('rollBtn').addEventListener('click', () => {
      const roll = Math.floor(Math.random() * 6) + 1;
      renderDice(roll);
      // Pick a random quote from the six
      const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
      quoteBox.textContent = randomQuote;
    });

    // Initial render
    renderDice(1);
  </script>
</body>
</html>
