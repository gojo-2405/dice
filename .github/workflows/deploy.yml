name: Deploy App 2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Stop old container
        run: docker rm -f app2 || true

      - name: Build image
        run: docker build -t app2-image .

      - name: Run container
        run: docker run -d -p 8080:80 --name app2 app2-image

      - name: Wait for app
        run: |
          for i in {1..10}; do
            curl -s http://localhost:8080 && break
            echo "Waiting for app..."
            sleep 3
          done

      - name: Install Cloudflared
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: Start Tunnel
        run: |
          cloudflared tunnel --url http://localhost:8080 --no-autoupdate > tunnel.log 2>&1 &
          sleep 10
          cat tunnel.log

      - name: Extract URL
        run: grep -o 'https://.*trycloudflare.com' tunnel.log || true
