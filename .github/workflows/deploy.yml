name: Deploy App 2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Stop old container
        run: docker rm -f app2 || true

      - name: Build image
        run: docker build -t app2-image .

      - name: Run container
        run: docker run -d -p 8080:80 --name app2 app2-image
